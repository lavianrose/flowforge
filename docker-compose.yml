services:
  postgres:
    image: postgres:16-alpine
    container_name: flowforge-postgres
    environment:
      POSTGRES_USER: flowforge
      POSTGRES_PASSWORD: flowforge
      POSTGRES_DB: flowforge
    ports:
      - "54322:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: flowforge-redis
    ports:
      - "63797:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flowforge-backend
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      PORT: 3000
      ENV: production
      POSTGRES_URL: postgres://flowforge:flowforge@postgres:5432/flowforge?sslmode=disable
      REDIS_URL: redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      DOCKER_HOST: unix:///var/run/docker.sock
      DOCKER_PYTHON_IMAGE: flowforge/runner-python:latest
      DOCKER_NODE_IMAGE: flowforge/runner-nodejs:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:3000/api/v1}
    container_name: flowforge-frontend
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:3000/api/v1}
    depends_on:
      - backend
    restart: unless-stopped

  # Runner images (build-only, use: docker compose --profile runners build)
  runner-python:
    build:
      context: ./runner/python
      dockerfile: Dockerfile
    image: flowforge/runner-python:latest
    profiles:
      - runners

  runner-nodejs:
    build:
      context: ./runner/nodejs
      dockerfile: Dockerfile
    image: flowforge/runner-nodejs:latest
    profiles:
      - runners

volumes:
  postgres_data:
  redis_data:
