version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: flowforge-postgres
    environment:
      POSTGRES_USER: flowforge
      POSTGRES_PASSWORD: flowforge
      POSTGRES_DB: flowforge
    ports:
      - "54322:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: flowforge-redis
    ports:
      - "63797:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend-migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile.migrate
    container_name: flowforge-backend-migrate
    environment:
      POSTGRES_URL: postgres://flowforge:flowforge@postgres:5432/flowforge?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  backend-seed:
    build:
      context: ./backend
      dockerfile: Dockerfile.seed
    container_name: flowforge-backend-seed
    environment:
      POSTGRES_URL: postgres://flowforge:flowforge@postgres:5432/flowforge?sslmode=disable
    depends_on:
      backend-migrate:
        condition: service_completed_successfully
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flowforge-backend
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      ENV: production
      POSTGRES_URL: postgres://flowforge:flowforge@postgres:5432/flowforge?sslmode=disable
      REDIS_URL: redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend-migrate:
        condition: service_completed_successfully
      backend-seed:
        condition: service_completed_successfully
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: flowforge-frontend
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000/api/v1
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
